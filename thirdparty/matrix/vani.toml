[package]
name    = "matrix"
version = "0.1.0"
entry   = "src/lib.vani"
authors = ["enthusiasticgeek"]
license = "MIT"
description = "Dense linear algebra for vāṇī: matrix construction, arithmetic, multiplication, inversion, LU and Cholesky decomposition."
